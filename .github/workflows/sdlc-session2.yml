name: SDLC Session 2 — Code Implementation

on:
  issues:
    types: [labeled]

jobs:
  code-implementation:
    if: github.event.label.name == '2-code-ready'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: sdlc/issue-${{ github.event.issue.number }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install anthropic

      - name: Install Node dependencies
        run: npm install

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge latest main into branch
        run: |
          git fetch origin main
          git merge origin/main --no-edit --allow-unrelated-histories

      - name: Run SDLC Session 2
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python3 .github/scripts/sdlc_session2.py

      - name: Commit and push
        run: |
          git add index.html src/moonLogic.js __tests__/ .github/sdlc_pr_body.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "SDLC Session 2: code implementation for issue #${{ github.event.issue.number }}"
            git push origin sdlc/issue-${{ github.event.issue.number }}
          fi

      - name: Notify issue — Session 2 complete
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "$(cat <<'EOF'
          ✅ **SDLC Session 2 complete** — Code implemented and unit tests passing.

          **Next step:** Apply label \`3-tests-ready\` to trigger automated verification test generation.
          EOF
          )"
