name: Claude PR Review

# Fires when a pull request is opened or new commits are pushed to it
on:
  pull_request:
    types: [opened, synchronize]

# GITHUB_TOKEN needs read on code, write on pull-requests to post comments
permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Check out the full history so we can diff against the base branch ──
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Capture the diff between this PR branch and main ──────────────────
      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD > pr.diff
          echo "Diff size: $(wc -c < pr.diff) bytes"

      # ── 3. Install the Anthropic Python SDK ──────────────────────────────────
      - name: Install anthropic SDK
        run: pip install anthropic --quiet

      # ── 4. Send diff to Claude, post response as a PR comment ────────────────
      - name: Review with Claude and post comment
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'EOF'
          import anthropic, os, json, urllib.request

          # Read the diff
          with open('pr.diff', 'r') as f:
              diff = f.read()

          if not diff.strip():
              print("Empty diff — nothing to review.")
              exit(0)

          # Truncate very large diffs to stay within token limits
          MAX_CHARS = 30000
          truncated = len(diff) > MAX_CHARS
          if truncated:
              diff = diff[:MAX_CHARS] + "\n\n[diff truncated — too large to show in full]"

          # Call Claude
          client = anthropic.Anthropic()
          message = client.messages.create(
              model="claude-sonnet-4-6",
              max_tokens=1024,
              messages=[{
                  "role": "user",
                  "content": f"""You are reviewing a pull request for "Find the Moon" — a mobile web app that shows users where the moon is. Key facts about the codebase:

- moonLogic.js contains pure JS functions (azimuth, phase, refraction, betaToElevation, etc.) that must stay in sync with the parallel implementations inside index.html
- SunCalc is the astronomy library
- DeviceOrientationEvent is used for compass (alpha) and tilt guide (beta)
- betaToElevation formula is (beta - 90), clamped to [0, 90]
- Verification tests live in __tests_verify__/, unit tests in __tests__/

Review this diff for:
- Bugs or logic errors
- Any drift between moonLogic.js and index.html (they must mirror each other)
- Missing edge cases or fragile assumptions
- Anything that could break on mobile (iOS or Android)
- Test coverage gaps — does the change need new or updated tests?

Be concise and specific. Group findings by severity (if any): Bug, Warning, Suggestion. If the diff looks clean, say so briefly — don't pad the review.

<diff>
{diff}
</diff>"""
              }]
          )

          review = message.content[0].text

          # Build the comment body
          note = "\n\n> ⚠️ Diff was truncated — review covers only the first 30 000 characters." if truncated else ""
          body = f"## 🤖 Claude Code Review\n\n{review}{note}"

          # Post as a PR comment via GitHub REST API
          url = f"https://api.github.com/repos/{os.environ['REPO']}/issues/{os.environ['PR_NUMBER']}/comments"
          data = json.dumps({"body": body}).encode()
          req = urllib.request.Request(url, data=data, headers={
              "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
              "Accept": "application/vnd.github+json",
              "Content-Type": "application/json",
          })
          urllib.request.urlopen(req)
          print("Review posted successfully.")
          EOF
