name: SDLC Session 5 — Quality Review

on:
  issues:
    types: [labeled]

jobs:
  quality-review:
    if: github.event.label.name == '5-quality-ready'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: sdlc/issue-${{ github.event.issue.number }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync SDLC scripts from main
        run: |
          git fetch origin main
          git checkout origin/main -- .github/scripts/ .github/workflows/

      - name: Get diff against main
        run: |
          git fetch origin main
          git diff origin/main..HEAD > /tmp/branch.diff

      - name: Run SDLC Session 5
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: python3 .github/scripts/sdlc_session5.py

      - name: Commit and push
        run: |
          git add docs/quality-review.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "SDLC Session 5: quality review for issue #${{ github.event.issue.number }}"
            git push origin sdlc/issue-${{ github.event.issue.number }}
          fi

      - name: Notify issue — Session 5 complete
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "$(cat <<'EOF'
          ✅ **SDLC Session 5 complete** — Quality review done. See the draft PR for the verdict.

          **Next step:** Review the draft PR, verify all checklist items, and merge when ready.
          EOF
          )"
