name: SDLC Orchestrator

on:
  issues:
    types: [labeled]

jobs:
  orchestrate:
    if: >
      github.event.label.name == '1-reqs-ready' ||
      github.event.label.name == '2-code-ready' ||
      github.event.label.name == '3-tests-ready' ||
      github.event.label.name == '4-security-ready' ||
      github.event.label.name == '5-quality-ready'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      # Session 1 checks out main (branch doesn't exist yet).
      # Sessions 2-5 check out the existing feature branch.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.label.name == '1-reqs-ready' && github.event.repository.default_branch || format('sdlc/issue-{0}', github.event.issue.number) }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install anthropic

      - name: Install Node dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Sync latest scripts and test guide from main onto the feature branch.
      # Skipped for Session 1 — already on main.
      - name: Sync SDLC scripts from main
        if: github.event.label.name != '1-reqs-ready'
        run: |
          git fetch origin main
          git checkout origin/main -- .github/scripts/ .github/workflows/ FTM-TEST-GUIDE.md

      - name: Run SDLC Orchestrator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          TRIGGER_LABEL: ${{ github.event.label.name }}
        run: python3 .github/scripts/sdlc_orchestrator.py
