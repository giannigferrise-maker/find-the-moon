name: SDLC Session 1 — Requirements & Tests

on:
  issues:
    types: [labeled]

jobs:
  requirements-and-tests:
    if: github.event.label.name == 'approved'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create branch
        run: |
          BRANCH="sdlc/issue-${{ github.event.issue.number }}-requirements"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Run SDLC Session 1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python3 .github/scripts/sdlc_session1.py

      - name: Commit and push
        run: |
          git add FTM-SRS-001.md traceability-matrix.txt \
                  __tests_verify__/verification.test.js \
                  __tests_verify__/verification.spec.js
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "SDLC Session 1: requirements and tests for issue #${{ github.event.issue.number }}"
            git push origin "$BRANCH"
          fi

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git ls-remote --exit-code origin "$BRANCH" > /dev/null 2>&1; then
            gh pr create \
              --title "SDLC: Requirements & tests for issue #${{ github.event.issue.number }}" \
              --body "$(cat .github/sdlc_pr_body.md)" \
              --base main \
              --head "$BRANCH"
          else
            echo "No changes were pushed — skipping PR creation."
          fi
