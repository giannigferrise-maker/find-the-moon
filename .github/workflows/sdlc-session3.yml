name: SDLC Session 3 — Automated Tests

on:
  issues:
    types: [labeled]

jobs:
  automated-tests:
    if: github.event.label.name == '3-tests-ready'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: sdlc/issue-${{ github.event.issue.number }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install anthropic

      - name: Install Node dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync SDLC scripts from main
        run: |
          git fetch origin main
          git checkout origin/main -- .github/scripts/ .github/workflows/

      - name: Run SDLC Session 3
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python3 .github/scripts/sdlc_session3.py

      - name: Commit and push
        run: |
          git add __tests_verify__/verification.test.js \
                  __tests_verify__/verification.spec.js
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "SDLC Session 3: automated tests for issue #${{ github.event.issue.number }}"
            git push origin sdlc/issue-${{ github.event.issue.number }}
          fi

      - name: Run Jest verification tests
        run: npx jest --config jest.verify.config.js --forceExit

      - name: Run Playwright verification tests
        continue-on-error: true
        run: npx playwright test --config playwright.verify.config.js __tests_verify__/verification.spec.js

      - name: Notify issue — Session 3 complete
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "$(cat <<'EOF'
          ✅ **SDLC Session 3 complete** — Verification tests written and passing.

          **Next step:** Apply label \`4-security-ready\` to trigger security review.
          EOF
          )"
